name: ProxChat
version: 0.4.0
main: fr.mybios.onevs100.proxchat.ProxChat
# api-version 1.13 is the post-flattening floor; proven to load on Folia 26.1.2.
api-version: "1.13"
# Folia is region-threaded: this MUST be declared or the server refuses to enable the plugin.
folia-supported: true
authors: [MyBios]
description: Proximity text chat - speech bubbles above the speaker.
commands:
  proxchat:
    description: ProxChat admin lever (admin surface - English replies).
    usage: /proxchat <status|on|off|suppress|clear|reload>
    permission: proxchat.admin
permissions:
  proxchat.admin:
    description: Operate the ProxChat admin command.
    default: op
