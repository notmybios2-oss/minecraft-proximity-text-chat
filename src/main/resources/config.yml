# ProxChat - proximity speech bubbles.
# Read at enable and on /proxchat reload; every value applies live (consumers hold suppliers).
# Out-of-range values are clamped with a console warning - a config typo never blocks enabling.
# This file is never written back by the plugin; keys missing from a deployed copy fall back
# to their defaults (that per-key fallback is how new keys splice into old deployments).
bubbles:
  # Hard server-side visibility radius in blocks (same world only). Admission is
  # server-authoritative: a modified client cannot read bubbles beyond this radius,
  # because it never receives them. view-range below is only a client-side cull belt.
  radius-blocks: 24.0
  # Seconds before a bubble fades. Expiry is scheduled per bubble; a 0.5 s reconciler
  # backstops lost tasks.
  lifetime-seconds: 8
  # Bubble stack depth per player: newest at the bottom, oldest falls off the top.
  max-per-player: 3
  # Mounted-display translation above the RIDE anchor, not the head - tuned live in-game.
  # Change only with an in-game re-check.
  height-above-head: 1.2
  # Vertical distance between stacked bubbles (blocks).
  stack-spacing: 0.30
  # Sneaking hides the sneaker's bubbles; they reappear on rising if lifetime remains (Q1).
  hide-on-sneak: true
  # Maximum message length in CODE POINTS, counted after sanitization. Longer input is
  # rejected with the red French line, whose number tracks this value automatically (Q4).
  max-message-length: 96
  # Client text wrap width in pixels - the only line-break authority (newlines never
  # survive sanitization).
  line-width: 200
  # Display view range as a fraction of the client's 64-block entity render base.
  # Cull belt only; the hard guarantee is the admission radius above.
  view-range: 0.5
  # Per-player minimum interval between accepted messages (ms); excess is dropped
  # silently (anti-churn guard - every bubble costs an entity spawn + packet fan-out).
  # Deliberately NOT applied to the overlong-reject line: a reject is one message to
  # the abuser's own client - no entity, no fan-out - and Paper's built-in chat spam
  # kicker bounds the flood upstream.
  min-message-interval-ms: 750
# Server-side conversation record: one JSON line per rendered bubble, written to
# plugins/ProxChat/conversation/bubbles-YYYY-MM-DD.jsonl (daily files, tail-friendly).
# Each line carries the speaker, the sanitized text exactly as it rendered, and the set of
# players close enough to read it at send time. OFF by default: enabling means chat content
# is written to disk - a deliberate operator decision, not something a plugin should silently
# do. Writing is fully asynchronous; it can never block or delay a bubble.
conversation-log:
  enabled: false
  # Days of files to keep, pruned when a new day file opens. 0 = never delete (default):
  # files are kept until an operator removes them.
  retention-days: 0
  # Also record one "admit" line when a player walks into radius while a bubble is still
  # up - without these, late entrants who could read the text are invisible to the record.
  log-admits: true
